services:
  postgres:
    image: postgres:16-alpine
    container_name: glamour-postgres
    restart: unless-stopped
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_DB: glamour
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
